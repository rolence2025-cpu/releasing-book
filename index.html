<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐盛之書</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #5b7fa6;
      --sidebar-width: 260px;
      --base-font-size: 16px;
      --base-line-height: 1.8;
    }
    .sidebar .app-name { font-size: 1.2em; font-weight: bold; }
    .markdown-section h1 { border-bottom: 2px solid #eee; padding-bottom: .3em; }
    .markdown-section blockquote { border-left: 4px solid #5b7fa6; color: #555; }
  </style>
</head>
<body>
  <div id="app">載入中...</div>
  <script>
    window.$docsify = {
      name: '豐盛之書',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '搜尋...',
        noData: '找不到結果',
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
